<!DOCTYPE html>
<html>
<head>
  <title>My Web Projects</title>
  <style>
    body {
      background-color: #1a1a1a;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    h1 {
      text-align: center;
      color: #00C9A7;
    }

    .gallery {
      display: grid;
      grid-template-columns:repeat(2, 1fr);
      gap: 50px;
      margin-top: 40px;
    }

    .project {
      background: #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 201, 167, 0.2);
    }

    .project img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .project p {
      padding: 10px;
      color: #ccc;
    }

    .back-link {
      display: block;
      margin: 40px auto 0;
      width: max-content;
      padding: 10px 20px;
      background: #00C9A7;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>My Web Projects</h1>

  <div class="gallery">
    <div class="project">
      <img src="images/assets/shopping.png" alt="Project 1">
     <a href="https://myommerce.netlify.app/"><p>shopping Website</p></a> 
    </div>
    <div class="project">
      <img src="images/assets/market.png" alt="Project 2">
      <a href="https://jubi-ad-marketplace.netlify.app/dashboard/create-ad"><p>E-commerce Website</p></a>
    </div>
    <div class="project">
      <img src="images/assets/hospital.png" alt="Project 3">
      <a href="https://amadia-hospital.netlify.app/"><p>hospital</p></a>
    </div>
    <div class="project">
      <img src="images/assets/edit.png" alt="Project 4">
      <p>Blog Platform</p>
    </div>
    <div class="project">
      <img src="images/assets/Screenshot 2025-06-12 133958.png" alt="Project 5">
      <p>Form</p>
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to Home</a>

</body>
</html>
